<!doctype html>
<html lang="en">
<head>
    <title>Rural Scheme Eligibility Engine</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet">
      <style>
.nav-link.active {
    font-weight: bold;
}
</style>

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <!-- Logo / Home -->
    <a class="navbar-brand" href="{% url 'home' %}">
        Scheme Engine
    </a>

    <!-- Mobile Toggle Button -->
    <button class="navbar-toggler" type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation">

        <span class="navbar-toggler-icon"></span>

    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

      {% if user.is_authenticated %}

      <!-- LEFT SIDE MENU -->
      <ul class="navbar-nav">

        <li class="nav-item">
<a class="nav-link {% if request.path == '/check/' %}active{% endif %}"
   href="{% url 'check_scheme' %}">
Check Eligibility
</a>
</li>

        <li class="nav-item">
<a class="nav-link {% if request.path == '/dashboard/' %}active{% endif %}"
   href="{% url 'dashboard' %}">
Dashboard
</a>
</li>

        <li class="nav-item">
<a class="nav-link {% if request.path == '/analytics/' %}active{% endif %}"
   href="{% url 'analytics_dashboard' %}">
Analytics
</a>
</li>

      </ul>

      <!-- RIGHT SIDE LOGOUT -->
      <div class="ms-auto">

        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button class="btn btn-danger btn-sm px-3">
            Logout
          </button>
        </form>

      </div>

      {% else %}

      <!-- GUEST MENU -->
      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link" href="{% url 'login' %}">
            Login
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'register' %}">
            Register
          </a>
        </li>

      </ul>

      {% endif %}

    </div>

  </div>
</nav>


<!-- MAIN PAGE CONTENT -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>
<footer class="bg-dark text-white text-center py-3 mt-5">

<p class="mb-0">
Rural Scheme Eligibility Engine © 2026
</p>

</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
</body>
</html>
