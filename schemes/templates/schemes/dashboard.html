{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Your Eligibility History</h2>

<div class="card p-4 shadow">
<table class="table">
    <thead>
        <tr>
            <th>Scheme</th>
            <th>Checked At</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody>
    {% for check in checks %}
        <tr>
            <td>{{ check.scheme.name }}</td>
            <td>{{ check.checked_at }}</td>
            <td>
                {% if check.is_eligible %}
                    <span class="badge bg-success">Eligible</span>
                {% else %}
                    <span class="badge bg-danger">Not Eligible</span>
                {% endif %}
            </td>
        </tr>
    {% empty %}
        <tr>
            <td colspan="3">No history found</td>
        </tr>
    {% endfor %}
    </tbody>
</table>
</div>

{% endblock %}
